# fly.toml app configuration file generated for litte-code on 2026-07-08T09:05:04-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'litte-code'
primary_region = 'gru'
kill_signal = 'SIGTERM'

[build]

[deploy]
  # Blue/green: Fly boots a second set of machines, waits for their health
  # checks to pass, flips traffic over, then decommissions the old set.
  # Zero-downtime deploys at the cost of briefly running 2x machines.
  strategy = 'bluegreen'
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'little-co.de'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

  # Blue/green needs a real readiness signal to know when the new machines
  # are ready to take traffic. `/up` returns 200 as soon as the app boots.
  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    timeout = '5s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
