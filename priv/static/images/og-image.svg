<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.05" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Corner accents -->
  <circle cx="1050" cy="120" r="180" fill="#a855f7" fill-opacity="0.18" />
  <circle cx="120" cy="540" r="140" fill="#fb923c" fill-opacity="0.18" />

  <!-- Logo mark -->
  <g transform="translate(120 220)">
    <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#brand)" />
    <g transform="translate(20 20)" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round">
      <path d="M6 20 a10 10 0 0 1 10 -10 h6" />
      <path d="M26 12 a10 10 0 0 1 10 10 h-6" transform="translate(-4 -2)" />
      <path d="M12 20 h12" transform="translate(0 -2)" />
    </g>
  </g>

  <!-- Wordmark -->
  <text x="120" y="380" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, sans-serif" font-size="128" font-weight="800" fill="url(#brand)" letter-spacing="-4">
    little-co.de
  </text>

  <!-- Tagline -->
  <text x="120" y="450" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, sans-serif" font-size="36" font-weight="500" fill="#e2e8f0" letter-spacing="-0.5">
    Tiny links and pretty QR codes.
  </text>

  <!-- Footer credit -->
  <text x="120" y="560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#94a3b8">
    Built with Phoenix Framework · @lubien
  </text>
</svg>
